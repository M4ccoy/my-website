name: Lab 3 Dedicated Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint "*.html"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t my-site:latest .

  push:
    name: Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker image
        run: docker push $IMAGE_NAME

  performance-tests:
    name: Performance Tests with k6
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image for testing
        run: docker build -t my-site:latest .

      - name: Start container
        run: docker run -d --name my-site-container -p 8080:80 my-site:latest

      - name: Wait for app
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:8080; then
              echo "App is ready"
              break
            else
              echo "Waiting for app..."
              sleep 5
            fi
          done

      - name: Run k6 load test
        continue-on-error: true
        run: docker run --rm --network host -e BASE_URL=http://localhost:8080 -v ${{ github.workspace }}/scripts:/scripts grafana/k6 run /scripts/load_test.js

      - name: Run k6 stress test
        continue-on-error: true
        run: docker run --rm --network host -e BASE_URL=http://localhost:8080 -v ${{ github.workspace }}/scripts:/scripts grafana/k6 run /scripts/stress_test.js

      - name: Run k6 threshold test
        continue-on-error: true
        run: docker run --rm --network host -e BASE_URL=http://localhost:8080 -v ${{ github.workspace }}/scripts:/scripts grafana/k6 run /scripts/ci_thresholds_test.js

      - name: Cleanup
        if: always()
        run: |
          docker stop my-site-container || true
          docker rm my-site-container || true